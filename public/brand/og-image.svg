  <text x="100" y="478" font-family="Georgia, serif" font-style="italic" font-size="48" fill="#ffffff">made personal.</text>
  <text x="100" y="555" font-family="Helvetica, Arial, sans-serif" font-size="20" letter-spacing="2" fill="#8a8a8a">MELBOURNE · SOUTH EAST</text>
