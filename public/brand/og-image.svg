    <rect x="810" y="320" width="30" height="230"/>
    <rect x="850" y="360" width="22" height="190"/>
    <rect x="880" y="280" width="34" height="270"/>
    <rect x="922" y="340" width="24" height="210"/>
    <rect x="956" y="240" width="40" height="310"/>
    <rect x="1006" y="300" width="28" height="250"/>
    <rect x="1044" y="350" width="22" height="200"/>
    <rect x="1074" y="310" width="32" height="240"/>
